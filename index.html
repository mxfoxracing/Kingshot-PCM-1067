<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>PCM 1067 – Rankings</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #050505, #0d0d0d, #111);
    color: #eee;
    margin: 0;
    padding: 0;
  }

  .container {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
  }

  h1 {
    text-align: center;
    margin-bottom: 10px;
    font-size: 38px;
    color: #ffd700;
    text-shadow: 0 0 15px #ffcc00;
    letter-spacing: 2px;
  }

  /* --- Neuer Bereich: Bild + Timetable nebeneinander --- */
  .header-flex {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 25px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .header-flex img {
    width: 100%;
    max-width: 450px;
    border-radius: 14px;
    box-shadow: 0 0 25px rgba(255, 215, 0, 0.3);
  }

  .info-box {
    background: rgba(20, 20, 20, 0.9);
    padding: 18px 22px;
    border-radius: 14px;
    border: 1px solid rgba(0, 200, 255, 0.25);
    box-shadow: 0 0 20px rgba(0, 255, 255, 0.15);
    max-width: 300px;
  }

  .info-box h3 {
    margin-top: 0;
    color: #00eaff;
    text-shadow: 0 0 10px #00c3ff;
    font-size: 22px;
  }

  .info-box ul {
    margin: 0;
    padding-left: 18px;
  }

  .info-box li {
    margin-bottom: 6px;
    font-size: 15px;
  }

  /* --- Rest wie gehabt --- */
  .card {
    background: rgba(20, 20, 20, 0.9);
    padding: 20px;
    border-radius: 14px;
    margin-top: 25px;
    box-shadow: 0 0 25px rgba(0, 255, 255, 0.15);
    border: 1px solid rgba(0, 200, 255, 0.2);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
  }

  th {
    background: #222;
    color: #ffd700;
    padding: 10px;
    text-align: left;
    font-size: 16px;
    border-bottom: 2px solid #444;
  }

  td {
    padding: 8px;
    border-bottom: 1px solid #333;
    font-size: 15px;
  }

  tr:hover {
    background: rgba(255, 255, 255, 0.05);
  }

  @media (max-width: 600px) {
    h1 { font-size: 28px; }
    .info-box { max-width: 100%; }
  }
</style>
</head>

<body>
<div class="container">

<h1>[PCM]PeaceMakers - 1067</h1>

<!-- Neuer Bereich: Titelbild + Serverbild + Timetable -->
<div class="header-flex">
  <img src="titelbild.png" alt="Titelbild">
  <img src="serverbild.png" alt="Serverbild">

  <div class="info-box">
    <h3>Timetable</h3>
    <ul>
      <li>Bear Traps: 13UTC / 19UTC</li>
      <li>Swordland L1/L2: 14UTC / 19UTC</li>
      <li>Tri Alliance Clash L1/L2: 14UTC / 19UTC</li>
    </ul>
  </div>
</div>

<!-- ALLIANZEN -->
<div class="card">
  <h2>Top 10 Alliances</h2>
  <table id="allianzen">
    <thead>
      <tr><th>Rank</th><th>Alliance</th><th>Power</th></tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<!-- MEMBER -->
<div class="card">
  <h2>Top 20 Members of PCM</h2>
  <table id="member">
    <thead>
      <tr><th>Rank</th><th>Player</th><th>Power</th></tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<!-- GLOBAL PLAYERS -->
<div class="card">
  <h2>Top 30 Players</h2>
  <table id="spieler">
    <thead>
      <tr><th>Rank</th><th>Alliance</th><th>Player</th><th>Power</th></tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

</div>

<script>
function ladeTabelle(jsonDatei, tableId, mapper) {
  fetch(jsonDatei)
    .then(r => r.json())
    .then(data => {
      const tbody = document.querySelector(`#${tableId} tbody`);
      data.forEach(row => {
        const tr = document.createElement("tr");
        tr.innerHTML = mapper(row);
        tbody.appendChild(tr);
      });
    });
}

// Alliances
ladeTabelle("alliances.json", "allianzen", row => `
  <td>${row.rang}</td>
  <td>${row.allianz}</td>
  <td>${row.kraft.toLocaleString("de-DE")}</td>
`);

// Members
ladeTabelle("members.json", "member", row => `
  <td>${row.rang}</td>
  <td>${row.spieler}</td>
  <td>${row.kraft.toLocaleString("de-DE")}</td>
`);

// Global Players
ladeTabelle("player_global.json", "spieler", row => `
  <td>${row.rang}</td>
  <td>${row.allianz}</td>
  <td>${row.spieler}</td>
  <td>${row.kampfpunkte.toLocaleString("de-DE")}</td>
`);
</script>

</body>
</html>
