<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>PCM 1067 – Rankings</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #050505, #0d0d0d, #111);
    color: #eee;
    margin: 0;
    padding: 0;
  }

  .container {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
  }

  h1 {
    text-align: center;
    margin-bottom: 10px;
    font-size: 38px;
    color: #ffd700;
    text-shadow: 0 0 15px #ffcc00;
    letter-spacing: 2px;
  }

  h2 {
    margin-top: 20px;
    text-align: center;
    font-size: 26px;
    color: #00eaff;
    text-shadow: 0 0 12px #00c3ff;
  }

  .card {
    background: rgba(20, 20, 20, 0.9);
    padding: 20px;
    border-radius: 14px;
    margin-top: 25px;
    box-shadow: 0 0 25px rgba(0, 255, 255, 0.15);
    border: 1px solid rgba(0, 200, 255, 0.2);
  }

  img {
    width: 100%;
    max-width: 650px;
    display: block;
    margin: 20px auto;
    border-radius: 14px;
    box-shadow: 0 0 25px rgba(255, 215, 0, 0.3);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
  }

  th {
    background: #222;
    color: #ffd700;
    padding: 10px;
    text-align: left;
    font-size: 16px;
    border-bottom: 2px solid #444;
  }

  td {
    padding: 8px;
    border-bottom: 1px solid #333;
    font-size: 15px;
  }

  tr:hover {
    background: rgba(255, 255, 255, 0.05);
  }

  @media (max-width: 600px) {
    h1 { font-size: 28px; }
    h2 { font-size: 20px; }
    td, th { font-size: 13px; }
  }
</style>
</head>

<body>
<div class="container">

<h1>[PCM]PeaceMakers - 1067</h1>
<img src="titelbild.png" alt="Titelbild">

<!-- ALLIANZEN -->
<div class="card">
  <h2>Top 10 Alliances</h2>
  <table id="allianzen">
    <thead>
      <tr><th>Rank</th><th>Alliance</th><th>Power</th></tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<!-- MEMBER -->
<div class="card">
  <h2>Top 20 Members of PCM</h2>
  <table id="member">
    <thead>
      <tr><th>Rank</th><th>Player</th><th>Power</th></tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<!-- GLOBAL PLAYERS -->
<div class="card">
  <h2>Top 30 Players</h2>
  <table id="spieler">
    <thead>
      <tr><th>Rank</th><th>Alliance</th><th>Player</th><th>Power</th></tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

</div>

<script>
function ladeTabelle(jsonDatei, tableId, mapper) {
  fetch(jsonDatei)
    .then(r => r.json())
    .then(data => {
      const tbody = document.querySelector(`#${tableId} tbody`);
      data.forEach(row => {
        const tr = document.createElement("tr");
        tr.innerHTML = mapper(row);
        tbody.appendChild(tr);
      });
    });
}

// Alliances
ladeTabelle("alliances.json", "allianzen", row => `
  <td>${row.rang}</td>
  <td>${row.allianz}</td>
  <td>${row.kraft.toLocaleString("de-DE")}</td>
`);

// Members
ladeTabelle("members.json", "member", row => `
  <td>${row.rang}</td>
  <td>${row.spieler}</td>
  <td>${row.kraft.toLocaleString("de-DE")}</td>
`);

// Global Players
ladeTabelle("player_global.json", "spieler", row => `
  <td>${row.rang}</td>
  <td>${row.allianz}</td>
  <td>${row.spieler}</td>
  <td>${row.kampfpunkte.toLocaleString("de-DE")}</td>
`);
</script>

</body>
</html>
