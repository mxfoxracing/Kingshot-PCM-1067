<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Ranking Übersicht</title>
<style>
  body { font-family: Arial; background: #f5f5f5; padding: 20px; }
  h1, h2 { text-align: center; }
  table { width: 100%; border-collapse: collapse; background: white; margin-bottom: 40px; }
  th, td { padding: 8px; border-bottom: 1px solid #ddd; text-align: left; }
  th { background: #333; color: white; }
  img { width: 100%; max-width: 600px; display: block; margin: 0 auto 20px auto; border-radius: 8px; }
</style>
</head>
<body>

<h1>[PCM]PeaceMaker - 1067</h1>
<img src="titelbild.png" alt="Titelbild">

<!-- 1. ALLIANZEN -->
<h2>Top 10 Alliances</h2>
<table id="allianzen">
  <thead>
    <tr><th>Rang</th><th>Allianz</th><th>Kraft</th></tr>
  </thead>
  <tbody></tbody>
</table>

<!-- 2. MEMBER DER ALLIANZ -->
<h2>Top 20 Members of PCM</h2>
<table id="members">
  <thead>
    <tr><th>Rang</th><th>Spieler</th><th>Kraft</th></tr>
  </thead>
  <tbody></tbody>
</table>

<!-- 3. TOP 30 SPIELER GLOBAL -->
<h2>Top 30 Players</h2>
<table id="spieler">
  <thead>
    <tr><th>Rang</th><th>Allianz</th><th>Spieler</th><th>Kampfpunkte</th></tr>
  </thead>
  <tbody></tbody>
</table>

<script>
function ladeTabelle(jsonDatei, tableId, mapper) {
  fetch(jsonDatei)
    .then(r => r.json())
    .then(data => {
      const tbody = document.querySelector(`#${tableId} tbody`);
      data.forEach(row => {
        const tr = document.createElement("tr");
        tr.innerHTML = mapper(row);
        tbody.appendChild(tr);
      });
    })
    .catch(err => console.error("Fehler beim Laden von", jsonDatei, err));
}

// 1. Allianzen
ladeTabelle("alliances.json", "allianzen", row => `
  <td>${row.rang}</td>
  <td>${row.allianz}</td>
  <td>${row.kraft.toLocaleString("de-DE")}</td>
`);

// 2. Allianz-Mitglieder
ladeTabelle("members.json", "members", row => `
  <td>${row.rang}</td>
  <td>${row.spieler}</td>
  <td>${row.kraft.toLocaleString("de-DE")}</td>
`);

// 3. Top 30 Spieler global
ladeTabelle("player_global.json", "spieler", row => `
  <td>${row.rang}</td>
  <td>${row.allianz}</td>
  <td>${row.spieler}</td>
  <td>${row.kampfpunkte.toLocaleString("de-DE")}</td>
`);
</script>

</body>
</html>
