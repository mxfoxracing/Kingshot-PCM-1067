<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>PCM 1067 – Rankings</title>

<style>
/* GLOBAL */
body {
  font-family: 'Orbitron', Arial, sans-serif;
  background: #000;
  color: #e6f7ff;
  margin: 0;
  padding: 0;
}

.container {
  max-width: 1400px;
  margin: auto;
  padding: 20px;
}

/* TITLE */
h1 {
  text-align: center;
  font-size: 46px;
  color: #ffd700;
  text-shadow: 0 0 20px #ffcc00;
  margin-top: 10px;
}

/* TITLE IMAGE */
.title-img {
  width: 100%;
  max-width: 900px;
  display: block;
  margin: 20px auto;
  border-radius: 12px;
  box-shadow: 0 0 25px rgba(255,215,0,0.3);
}

/* TIMETABLE + SERVERBILD */
.info-row {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  gap: 40px;
  margin-top: 10px;
  flex-wrap: wrap;
}

.info-box {
  background: rgba(20,20,20,0.9);
  padding: 20px;
  border-radius: 12px;
  border: 1px solid rgba(0,200,255,0.3);
  box-shadow: 0 0 20px rgba(0,200,255,0.2);
  min-width: 260px;
}

.info-box h3 {
  margin-top: 0;
  color: #00eaff;
  text-shadow: 0 0 10px #00c3ff;
  font-size: 22px;
}

.info-box ul {
  margin: 0;
  padding-left: 18px;
}

.server-small {
  width: 200px;
  border-radius: 12px;
  box-shadow: 0 0 20px rgba(0,200,255,0.3);
}

.motto {
  text-align: center;
  margin-top: 8px;
  font-size: 15px;
  color: #ffd700;
  text-shadow: 0 0 10px #ffcc00;
}

/* TABLE GRID */
.table-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1.2fr;
  gap: 25px;
  margin-top: 40px;
}

/* PANELS */
.card {
  background: rgba(20,20,20,0.9);
  padding: 20px;
  border-radius: 12px;
  border: 1px solid rgba(0,200,255,0.3);
  box-shadow: 0 0 20px rgba(0,200,255,0.15);
}

h2 {
  text-align: center;
  font-size: 24px;
  color: #00eaff;
  text-shadow: 0 0 10px #00c3ff;
}

/* TABLES */
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 15px;
}

th {
  background: #222;
  color: #ffd700;
  padding: 10px;
  text-align: left;
  font-size: 16px;
  border-bottom: 2px solid #444;
}

td {
  padding: 8px;
  border-bottom: 1px solid #333;
  font-size: 15px;
}

tr:hover {
  background: rgba(255,255,255,0.05);
}
</style>
</head>

<body>

<div class="container">

<h1>[PCM] PeaceMakers – 1067</h1>

<img src="titelbild.png" class="title-img" alt="Titelbild">

<!-- TIMETABLE + SERVERBILD -->
<div class="info-row">

  <div class="info-box">
    <h3>Timetable</h3>
    <ul>
      <li>Bear Traps: 13UTC / 19UTC</li>
      <li>Swordland L1/L2: 14UTC / 19UTC</li>
      <li>Tri Alliance Clash L1/L2: 14UTC / 19UTC</li>
    </ul>
  </div>

  <div>
    <img src="serverbild.png" class="server-small" alt="Serverbild">
    <div class="motto">Part of the 1067‑TITANS</div>
  </div>

</div>

<!-- TABLE GRID -->
<div class="table-grid">

  <div class="card">
    <h2>Top 10 Alliances</h2>
    <table id="allianzen">
      <thead>
        <tr><th>Rank</th><th>Alliance</th><th>Power</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="card">
    <h2>Top 20 Members of PCM</h2>
    <table id="member">
      <thead>
        <tr><th>Rank</th><th>Player</th><th>Power</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="card">
    <h2>Top 30 Players</h2>
    <table id="spieler">
      <thead>
        <tr><th>Rank</th><th>Alliance</th><th>Player</th><th>Power</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</div>

</div>

<script>
function ladeTabelle(jsonDatei, tableId, mapper) {
  fetch(jsonDatei)
    .then(r => r.json())
    .then(data => {
      const tbody = document.querySelector(`#${tableId} tbody`);
      data.forEach(row => {
        const tr = document.createElement("tr");
        tr.innerHTML = mapper(row);
        tbody.appendChild(tr);
      });
    });
}

ladeTabelle("alliances.json", "allianzen", row => `
  <td>${row.rang}</td>
  <td>${row.allianz}</td>
  <td>${row.kraft.toLocaleString("de-DE")}</td>
`);

ladeTabelle("members.json", "member", row => `
  <td>${row.rang}</td>
  <td>${row.spieler}</td>
  <td>${row.kraft.toLocaleString("de-DE")}</td>
`);

ladeTabelle("player_global.json", "spieler", row => `
  <td>${row.rang}</td>
  <td>${row.allianz}</td>
  <td>${row.spieler}</td>
  <td>${row.kampfpunkte.toLocaleString("de-DE")}</td>
`);
</script>

</body>
</html>
